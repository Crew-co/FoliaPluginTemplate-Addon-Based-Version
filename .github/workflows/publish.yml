name: Publish API

# Publishes the addon API to GitHub Packages so addon projects can compile
# against it. Triggered by a version tag:
#
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read
  packages: write   # required, or the publish 403s

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # Version comes from the tag (v1.0.0 -> 1.0.0). `build` runs the tests, so
      # a broken API is never published.
      - name: Build & publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew build publishApi --no-daemon -Pversion=${GITHUB_REF_NAME#v}
